---
- name: Full WordPress stack
  hosts: all
  become: true
  vars_files:
    - ../vault.yml
  vars:
    wp_domain: opdracht3.sel.edu
    wp_path: /var/www/wordpress
    wp_db_name: wordpress
    wp_db_user: wpuser
    skip_common: false

  roles:
    - role: common
      when: not skip_common
    - mariadb
    - wordpress

  post_tasks:
    - name: Show connection info
      debug:
        msg:
          - "=========================================="
          - "Add this line to your /etc/hosts file:"
          - "{{ ansible_host }}    {{ wp_domain }}"
          - ""
          - "Then open: https://{{ wp_domain }}"
          - "(Self-signed certificate - accept the warning)"
          - "=========================================="
