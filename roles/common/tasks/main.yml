---
- name: Harden SSH
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
  loop:
    - { regexp: '^#?PasswordAuthentication', line: 'PasswordAuthentication no' }
    - { regexp: '^#?PubkeyAuthentication', line: 'PubkeyAuthentication yes' }
    - { regexp: '^#?PermitRootLogin', line: 'PermitRootLogin prohibit-password' }
    - { regexp: '^#?ChallengeResponseAuthentication', line: 'ChallengeResponseAuthentication no' }
  notify: Restart SSH

- name: Install packages
  apt:
    name: [ufw, fail2ban, fastfetch]
    state: present
    update_cache: false
  register: pkg_install

- name: Reset connection to pick up new binaries
  meta: reset_connection
  when: pkg_install.changed

# UFW module is very slow (~50s) because each call opens a new connection
# Using shell instead takes ~2s total
# Not ideal, but much faster for this use case and maybe the demo
#
# - name: Configure UFW defaults
#   ufw:
#     direction: "{{ item.direction }}"
#     policy: "{{ item.policy }}"
#   loop:
#     - { direction: incoming, policy: deny }
#     - { direction: outgoing, policy: allow }
#
# - name: Allow UFW ports
#   ufw:
#     rule: allow
#     port: "{{ item }}"
#     proto: tcp
#   loop:
#     - "22"
#     - "80"
#     - "443"
#     - "3306"
#
# - name: Enable UFW
#   ufw:
#     state: enabled

- name: Configure UFW
  shell: |
    ufw --force reset
    ufw default deny incoming
    ufw default allow outgoing
    ufw allow 22/tcp
    ufw allow 80/tcp
    ufw allow 443/tcp
    ufw allow 3306/tcp
    ufw --force enable
  args:
    executable: /bin/bash
  changed_when: true

- name: Configure fail2ban
  template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
  notify: Restart fail2ban

- name: Enable fail2ban
  service:
    name: fail2ban
    state: started
    enabled: true

- name: Add fastfetch to bashrc
  lineinfile:
    path: /root/.bashrc
    regexp: '^.*fastfetch.*$'
    line: 'fastfetch'
    create: true

- name: Add fastfetch to ansible user bashrc
  lineinfile:
    path: "/home/{{ ansible_user }}/.bashrc"
    regexp: '^.*fastfetch.*$'
    line: 'fastfetch'
    create: true
  when: ansible_user != 'root'
