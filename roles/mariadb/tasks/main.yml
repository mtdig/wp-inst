---
- name: Install MariaDB
  apt:
    name: [mariadb-server, python3-pymysql]
    state: present
    update_cache: false

- name: Start MariaDB
  service:
    name: mariadb
    state: started
    enabled: true

- name: Create .my.cnf for root
  copy:
    dest: /root/.my.cnf
    content: |
      [client]
      user=root
      password={{ db_root_password }}
    mode: "0600"

- name: Set MariaDB root password
  mysql_user:
    name: root
    password: "{{ db_root_password }}"
    check_implicit_admin: true

- name: Create WordPress database
  mysql_db:
    name: "{{ wp_db_name }}"
    state: present

- name: Create WordPress DB user
  mysql_user:
    name: "{{ wp_db_user }}"
    password: "{{ db_wp_password }}"
    priv: "{{ wp_db_name }}.*:ALL"
    state: present
