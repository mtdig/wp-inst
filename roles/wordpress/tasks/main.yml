---
- name: Install Apache and PHP
  apt:
    name:
      - apache2
      - php
      - php-mysql
      - php-curl
      - php-gd
      - php-xml
      - php-mbstring
      - libapache2-mod-php
    state: present
    update_cache: true

- name: Enable Apache modules
  apache2_module:
    name: "{{ item }}"
    state: present
  loop:
    - rewrite
    - ssl
  notify: Restart Apache

- name: Generate self-signed SSL certificate
  command:
    cmd: openssl req -x509 -nodes -days 365 -newkey rsa:2048 -keyout /etc/ssl/private/{{ wp_domain }}.key -out /etc/ssl/certs/{{ wp_domain }}.crt -subj "/CN={{ wp_domain }}"
    creates: /etc/ssl/certs/{{ wp_domain }}.crt

- name: Download WordPress
  get_url:
    url: https://wordpress.org/latest.tar.gz
    dest: /tmp/wordpress.tar.gz

- name: Extract WordPress
  unarchive:
    src: /tmp/wordpress.tar.gz
    dest: /var/www
    remote_src: true
    owner: www-data
    group: www-data

- name: Create wp-config.php
  template:
    src: wp-config.php.j2
    dest: "{{ wp_path }}/wp-config.php"
    owner: www-data
    group: www-data
    mode: "0640"

- name: Create Apache vhost
  template:
    src: vhost.conf.j2
    dest: /etc/apache2/sites-available/wordpress.conf
  notify: Restart Apache

- name: Enable WordPress site
  file:
    src: /etc/apache2/sites-available/wordpress.conf
    dest: /etc/apache2/sites-enabled/wordpress.conf
    state: link
  notify: Restart Apache

- name: Disable default site
  file:
    path: /etc/apache2/sites-enabled/000-default.conf
    state: absent
  notify: Restart Apache

- name: Download WP-CLI
  get_url:
    url: https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
    dest: /usr/local/bin/wp
    mode: "0755"

- name: Add wp alias to ansible user bashrc
  lineinfile:
    path: "/home/{{ ansible_user }}/.bashrc"
    regexp: '^alias wp='
    line: "alias wp='wp --path={{ wp_path }}'"
    create: true

- name: Add ansible user to www-data group
  user:
    name: "{{ ansible_user }}"
    groups: www-data
    append: true
